name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Derive version from tag
        id: vars
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Reset dist
        run: |
          rm -rf dist
          mkdir -p dist

      - name: Build release artifacts
        run: |
          if [ -d "hardware/nrf54l15clean/nrf54l15clean" ]; then
            SOURCE_VERSION="nrf54l15clean"
          else
            SOURCE_VERSION="$(ls -1 hardware/nrf54l15clean | sort -V | tail -n1)"
          fi
          ./scripts/build_release.py \
            --version "${{ steps.vars.outputs.version }}" \
            --source-version "${SOURCE_VERSION}" \
            --repo-url "https://github.com/${GITHUB_REPOSITORY}" \
            --release-base-url "https://github.com/${GITHUB_REPOSITORY}/releases/download/v{version}" \
            --include-openthread-core \
            --reuse-existing-hosttools

      - name: Verify checksum and size
        run: |
          PLATFORM_ARCHIVE="$(python3 - <<'PY'
          import json
          from pathlib import Path
          manifest = json.loads(Path('dist/release-manifest.json').read_text())
          print(manifest['platform']['archivePath'])
          PY
          )"
          python3 ./scripts/verify_package_index.py \
            --index dist/package_nrf54l15clean_index.json \
            --archive "${PLATFORM_ARCHIVE}"

      - name: Verify tracked package indexes match release build
        run: |
          diff -u package_nrf54l15clean_index.json dist/package_nrf54l15clean_index.json
          diff -u package_nrf54l15clean_stable_index.json dist/package_nrf54l15clean_stable_index.json
          diff -u package_nrf54l15clean_archive_index.json dist/package_nrf54l15clean_archive_index.json

      - name: Remove stale assets from existing tag release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${{ steps.vars.outputs.version }}"
          if ! gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            exit 0
          fi
          RELEASE_ID="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}" --jq '.id')"
          gh api "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets" --paginate --jq '.[] | [.id, .name] | @tsv' | \
          while IFS=$'\t' read -r ASSET_ID ASSET_NAME; do
            case "${ASSET_NAME}" in
              "nrf54l15clean-${VERSION}-"*.tar.bz2|package_nrf54l15clean_index.json|package_nrf54l15clean_stable_index.json|package_nrf54l15clean_archive_index.json|release-manifest.json)
                gh api -X DELETE "repos/${GITHUB_REPOSITORY}/releases/assets/${ASSET_ID}"
                ;;
            esac
          done

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          overwrite_files: true
          files: |
            dist/*
          generate_release_notes: true

      - name: Verify public release bytes
        run: |
          python3 ./scripts/verify_public_release.py \
            --index dist/package_nrf54l15clean_index.json \
            --version "${{ steps.vars.outputs.version }}" \
            --include-tools \
            --retries 12 \
            --retry-delay 10
